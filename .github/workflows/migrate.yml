# Applies supabase/migrations/*.sql to the production database whenever a
# migration lands on main. `supabase db push` only runs files that aren't
# already recorded in the remote migration history, so re-runs are safe.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — personal access token (supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_ID    — the project ref (the short id in the project URL)
#   SUPABASE_DB_PASSWORD   — the project's database password
name: Migrate database

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

concurrency: supabase-migrations

jobs:
  push-migrations:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
      - run: supabase db push
